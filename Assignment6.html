<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Desk Expert System</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
    }

    .container{
      width: 420px;
      height: 560px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    .header{
      background: #2563eb;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box{
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .msg{
      padding: 10px 14px;
      margin-bottom: 15px;
      border-radius: 10px;
      max-width: 80%;
      width: fit-content;
      line-height: 1.5;
    }

    .user{
      background: #dcfce7;
      margin-left: auto;
    }

    .bot{
      background: #dbeafe;
    }

    .input-area{
      display: flex;
      border-top: 1px solid #ccc;
    }

    input{
      flex: 1;
      padding: 14px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button{
      width: 90px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover{
      background: #1d4ed8;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      Help Desk Expert System
    </div>

    <div class="chat-box" id="chatBox">

      <div class="msg bot">
        Welcome! Describe your technical problem.
      </div>

    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Enter your problem...">
      <button onclick="sendMsg()">Send</button>
    </div>

  </div>

  <script>

    function getAnswer(q){

      q = q.toLowerCase();

      if(q.includes("password")){
        return "Reset password using 'Forgot Password' option.";
      }

      else if(q.includes("internet") || q.includes("wifi")){
        return "Restart router and check network cables.";
      }

      else if(q.includes("printer")){
        return "Check printer connection and reinstall drivers.";
      }

      else if(q.includes("slow")){
        return "Restart system and close unnecessary applications.";
      }

      else if(q.includes("virus")){
        return "Run antivirus scan immediately.";
      }

      else if(q.includes("login")){
        return "Verify username and password.";
      }

      else if(q.includes("error")){
        return "Reinstall the software or contact support.";
      }

      else if(q.includes("bye") || q.includes("exit")){
        return "Thank you for using Help Desk Expert System.";
      }

      else{
        return "Problem not found in knowledge base.";
      }
    }

    function sendMsg(){

      let input = document.getElementById("input");
      let chatBox = document.getElementById("chatBox");

      let text = input.value.trim();

      if(text === ""){
        return;
      }

      let userMsg = document.createElement("div");
      userMsg.className = "msg user";
      userMsg.innerText = text;

      chatBox.appendChild(userMsg);

      let botMsg = document.createElement("div");
      botMsg.className = "msg bot";
      botMsg.innerText = getAnswer(text);

      chatBox.appendChild(botMsg);

      chatBox.scrollTop = chatBox.scrollHeight;

      input.value = "";

    }

  </script>

</body>
</html>

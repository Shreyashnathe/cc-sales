<!DOCTYPE html>
<html>
<head>
  <title>Expert System</title>

  <style>

    body{
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    #box{
      width: 300px;
      margin: auto;
    }

    input{
      width: 200px;
      padding: 8px;
    }

    button{
      padding: 8px;
    }

    #ans{
      margin-top: 20px;
      border: 1px solid black;
      padding: 10px;
    }

  </style>
</head>

<body>

  <h2>Help Desk Expert System</h2>

  <div id="box">

    <input type="text" id="problem" placeholder="Enter problem">

    <button onclick="solve()">Check</button>

    <div id="ans"></div>

  </div>

  <script>

    function solve(){

      let p = document.getElementById("problem").value.toLowerCase();

      let a = "";

      if(p.includes("password"))
        a = "Reset password.";

      else if(p.includes("wifi"))
        a = "Restart router.";

      else if(p.includes("printer"))
        a = "Check printer connection.";

      else
        a = "Problem not found.";

      document.getElementById("ans").innerHTML = a;
    }

  </script>

</body>
</html>

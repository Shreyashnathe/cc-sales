<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Chatbot</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .chat-container{
      width: 400px;
      height: 550px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    .header{
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box{
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #fafafa;
    }

    .message{
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 10px;
      width: fit-content;
      max-width: 80%;
    }

    .bot{
      background: #e3f2fd;
    }

    .user{
      background: #d4edda;
      margin-left: auto;
    }

    .input-area{
      display: flex;
      border-top: 1px solid #ccc;
    }

    input{
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button{
      width: 90px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover{
      background: #0056b3;
    }

  </style>
</head>

<body>

  <div class="chat-container">

    <div class="header">
      College Chatbot
    </div>

    <div class="chat-box" id="chatBox">

      <div class="message bot">
        Hello! Ask me anything...
      </div>

    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script>

    function getResponse(msg){

      msg = msg.toLowerCase();

      if(msg.includes("hello") || msg.includes("hi")){
        return "Hello! How can I help you?";
      }

      if(msg.includes("admission")){
        return "Admissions are open. Visit the office.";
      }

      if(msg.includes("fee")){
        return "Fee details are available on the college website.";
      }

      if(msg.includes("timing")){
        return "College timings are 9 AM to 4 PM.";
      }

      if(msg.includes("courses")){
        return "We offer B.Tech, M.Tech and MBA programs.";
      }

      if(msg.includes("bye") || msg.includes("exit")){
        return "Goodbye!";
      }

      return "Sorry, I didn't understand!";
    }

    function sendMessage(){

      let input = document.getElementById("userInput");
      let chatBox = document.getElementById("chatBox");

      let text = input.value.trim();

      if(text === ""){
        return;
      }

      let userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerText = text;

      chatBox.appendChild(userMsg);

      let botMsg = document.createElement("div");
      botMsg.className = "message bot";
      botMsg.innerText = getResponse(text);

      chatBox.appendChild(botMsg);

      chatBox.scrollTop = chatBox.scrollHeight;

      input.value = "";
    }

  </script>

</body>
</html>
